version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: pokebattle-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: pokebattle
      MONGO_INITDB_ROOT_PASSWORD: pokemon123
      MONGO_INITDB_DATABASE: pokebattle
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build: .
    container_name: pokebattle-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://pokebattle:pokemon123@mongodb:27017/pokebattle?authSource=admin
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./pokebattle-backend-server.js:/app/pokebattle-backend-server.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local

networks:
  default:
    name: pokebattle-network
